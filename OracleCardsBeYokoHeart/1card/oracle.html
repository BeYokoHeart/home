<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oracle 1 Card</title>
    <link rel="stylesheet" href="oracle.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="oracle-body">

    <div class="oracle-container">

    <h2>Oracle 1 Card Spread </h2>
    <h3>(What does this card have to tell me today?)</h3>

    <p>Think of a question and click the button below.</p>

    <div class="oracle-topbar">
        <button id="drawBtn" class="oracle-btn">
            Draw a card
        </button>
    </div>

    <!-- JEDYNY SLOT KARTY -->
    <div class="oracle-card-slot">
        <img id="cardImage" src="../../images/oracle/back.jpg" alt="karta">
    </div>

    <div id="cardPreview">
        <img id="cardPreviewImg" src="" alt="preview">
    </div>

    <!-- TEKST WYNIKU -->
    <div class="card-meta">
        <h2 class="card-title" id="cardTitle"></h2>
        <p class="card-number" id="cardNumber"></p>

        <p class="card-description" id="cardDescription"></p>

        <div class="card-categories hidden">
            <p><span class="cat-label">Finances:</span> <span id="catFinance"></span></p>
            <p><span class="cat-label">Work:</span> <span id="catWork"></span></p>
            <p><span class="cat-label">Health:</span> <span id="catHealth"></span></p>
            <p><span class="cat-label">Luck:</span> <span id="catLuck"></span></p>
            <p><span class="cat-label">Mood:</span> <span id="catMood"></span></p>
            <p><span class="cat-label">Relationships:</span> <span id="catRelations"></span></p>
        </div>
    </div>

</div>



    <script src="../oraclebase.js"></script>
    <script src="oracle.js"></script>
    <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="BeYokoHeart" data-description="Support me on Buy me a coffee!" data-message="" data-color="#BD5FFF" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
   
</body>
</html>
